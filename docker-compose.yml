version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartdocrag-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: smartdocrag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartdocrag-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: